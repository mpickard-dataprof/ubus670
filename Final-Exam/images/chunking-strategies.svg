<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 580" width="430" height="290" font-family="Montserrat, Arial, sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="docGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8E8E8"/>
      <stop offset="100%" stop-color="#D0D0D0"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="430" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1D428A">Chunking Strategies Comparison</text>

  <!-- ════════════ Column 1: Semantic Section ════════════ -->
  <g transform="translate(30, 60)">
    <!-- Column header -->
    <rect x="0" y="0" width="240" height="44" rx="12" fill="#1D428A" filter="url(#shadow)"/>
    <text x="120" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Semantic Section</text>

    <!-- Document icon -->
    <rect x="40" y="62" width="160" height="200" rx="6" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="1.5" filter="url(#shadow)"/>
    <!-- Dog-ear -->
    <path d="M170 62 L200 92 L170 92 Z" fill="#E0E0E0" stroke="#CCCCCC" stroke-width="1"/>

    <!-- Chunk 1 - large -->
    <rect x="52" y="74" width="136" height="56" rx="4" fill="#1D428A" opacity="0.85"/>
    <text x="120" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">Ch 1 — Intro</text>
    <text x="120" y="116" text-anchor="middle" font-size="9" fill="#FFFFFF" opacity="0.8">large section</text>

    <!-- Chunk 2 - medium -->
    <rect x="52" y="138" width="136" height="40" rx="4" fill="#00968F" opacity="0.85"/>
    <text x="120" y="163" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">Ch 2 — Methods</text>

    <!-- Chunk 3 - small -->
    <rect x="52" y="186" width="136" height="64" rx="4" fill="#1D428A" opacity="0.65"/>
    <text x="120" y="215" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">Ch 3 — Results</text>
    <text x="120" y="231" text-anchor="middle" font-size="9" fill="#FFFFFF" opacity="0.8">longer section</text>

    <!-- Scissors / split lines -->
    <line x1="52" y1="134" x2="188" y2="134" stroke="#C8102E" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="52" y1="182" x2="188" y2="182" stroke="#C8102E" stroke-width="1.5" stroke-dasharray="4,3"/>

    <!-- Unequal size annotation -->
    <text x="206" y="108" font-size="9" fill="#333333" font-style="italic">Unequal</text>
    <text x="206" y="120" font-size="9" fill="#333333" font-style="italic">sizes</text>

    <!-- Label -->
    <rect x="20" y="280" width="200" height="36" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
    <text x="120" y="303" text-anchor="middle" font-size="11" font-weight="600" fill="#2E7D32">Best for structured docs</text>

    <!-- Checkmark -->
    <circle cx="120" cy="340" r="14" fill="#4CAF50"/>
    <path d="M112 340 L118 346 L130 334" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ════════════ Column 2: Fixed-Size + Overlap ════════════ -->
  <g transform="translate(310, 60)">
    <!-- Column header -->
    <rect x="0" y="0" width="240" height="44" rx="12" fill="#00968F" filter="url(#shadow)"/>
    <text x="120" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Fixed-Size + Overlap</text>

    <!-- Document icon -->
    <rect x="40" y="62" width="160" height="200" rx="6" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="1.5" filter="url(#shadow)"/>
    <path d="M170 62 L200 92 L170 92 Z" fill="#E0E0E0" stroke="#CCCCCC" stroke-width="1"/>

    <!-- Equal chunk 1 -->
    <rect x="52" y="74" width="136" height="42" rx="4" fill="#00968F" opacity="0.8"/>
    <text x="120" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">Chunk 1</text>

    <!-- Overlap zone 1-2 -->
    <rect x="52" y="108" width="136" height="16" rx="2" fill="#C8102E" opacity="0.25"/>
    <text x="198" y="120" font-size="8" fill="#C8102E" font-weight="600">overlap</text>

    <!-- Equal chunk 2 -->
    <rect x="52" y="116" width="136" height="42" rx="4" fill="#00968F" opacity="0.8"/>
    <text x="120" y="142" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">Chunk 2</text>

    <!-- Overlap zone 2-3 -->
    <rect x="52" y="150" width="136" height="16" rx="2" fill="#C8102E" opacity="0.25"/>
    <text x="198" y="162" font-size="8" fill="#C8102E" font-weight="600">overlap</text>

    <!-- Equal chunk 3 -->
    <rect x="52" y="158" width="136" height="42" rx="4" fill="#00968F" opacity="0.8"/>
    <text x="120" y="184" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">Chunk 3</text>

    <!-- Overlap zone 3-4 -->
    <rect x="52" y="192" width="136" height="16" rx="2" fill="#C8102E" opacity="0.25"/>
    <text x="198" y="204" font-size="8" fill="#C8102E" font-weight="600">overlap</text>

    <!-- Equal chunk 4 -->
    <rect x="52" y="200" width="136" height="42" rx="4" fill="#00968F" opacity="0.8"/>
    <text x="120" y="226" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">Chunk 4</text>

    <!-- Equal size annotation -->
    <line x1="38" y1="74" x2="38" y2="116" stroke="#333333" stroke-width="1"/>
    <line x1="34" y1="74" x2="42" y2="74" stroke="#333333" stroke-width="1"/>
    <line x1="34" y1="116" x2="42" y2="116" stroke="#333333" stroke-width="1"/>
    <text x="28" y="98" text-anchor="end" font-size="9" fill="#333333" font-style="italic">Equal</text>

    <!-- Label -->
    <rect x="20" y="280" width="200" height="36" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
    <text x="120" y="303" text-anchor="middle" font-size="11" font-weight="600" fill="#2E7D32">Best for unstructured docs</text>

    <!-- Checkmark -->
    <circle cx="120" cy="340" r="14" fill="#4CAF50"/>
    <path d="M112 340 L118 346 L130 334" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ════════════ Column 3: No Chunking ════════════ -->
  <g transform="translate(590, 60)">
    <!-- Column header -->
    <rect x="0" y="0" width="240" height="44" rx="12" fill="#888888" filter="url(#shadow)"/>
    <text x="120" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">No Chunking</text>

    <!-- Document icon -->
    <rect x="40" y="62" width="160" height="200" rx="6" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="1.5" filter="url(#shadow)"/>
    <path d="M170 62 L200 92 L170 92 Z" fill="#E0E0E0" stroke="#CCCCCC" stroke-width="1"/>

    <!-- One giant block -->
    <rect x="52" y="74" width="136" height="176" rx="4" fill="#888888" opacity="0.7"/>
    <text x="120" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Entire</text>
    <text x="120" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Document</text>

    <!-- Warning icon overlaid -->
    <circle cx="170" cy="92" r="16" fill="#C8102E" opacity="0.9"/>
    <text x="170" y="98" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">!</text>

    <!-- Label -->
    <rect x="8" y="280" width="224" height="36" rx="8" fill="#FFEBEE" stroke="#C8102E" stroke-width="1.5"/>
    <text x="120" y="303" text-anchor="middle" font-size="11" font-weight="600" fill="#C8102E">Risk: exceeds context window</text>

    <!-- Red X -->
    <circle cx="120" cy="340" r="14" fill="#C8102E"/>
    <line x1="112" y1="332" x2="128" y2="348" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="128" y1="332" x2="112" y2="348" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Bottom divider -->
  <line x1="60" y1="440" x2="800" y2="440" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Bottom annotation -->
  <text x="430" y="470" text-anchor="middle" font-size="12" fill="#333333" font-style="italic">Choose chunking strategy based on your document structure and the model's context window size.</text>

  <!-- Key -->
  <rect x="275" y="490" width="310" height="72" rx="10" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <text x="430" y="512" text-anchor="middle" font-size="11" font-weight="700" fill="#333333">KEY</text>
  <rect x="295" y="522" width="18" height="12" rx="2" fill="#C8102E" opacity="0.25"/>
  <text x="320" y="533" font-size="10" fill="#333333">= Overlap zone (shared context between chunks)</text>
  <line x1="295" y1="545" x2="313" y2="545" stroke="#C8102E" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="320" y="549" font-size="10" fill="#333333">= Semantic split boundary</text>
</svg>