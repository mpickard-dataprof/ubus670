<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 310" font-family="Montserrat, Arial, sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowRight" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#AAAAAA"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#333333">The RCTFC Prompt Engineering Framework</text>
  <text x="480" y="58" text-anchor="middle" font-size="12" fill="#888888">Five components of an effective AI prompt</text>

  <!-- R - Role -->
  <g filter="url(#shadow)">
    <rect x="30" y="90" width="155" height="200" rx="12" fill="#C8102E"/>
    <!-- Letter circle -->
    <circle cx="107" cy="130" r="28" fill="rgba(255,255,255,0.2)"/>
    <text x="107" y="140" text-anchor="middle" font-size="30" font-weight="800" fill="#FFFFFF">R</text>
    <!-- Label -->
    <text x="107" y="185" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">Role</text>
    <!-- Divider -->
    <line x1="55" y1="198" x2="160" y2="198" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <!-- Description -->
    <text x="107" y="220" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">Who the AI</text>
    <text x="107" y="235" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">acts as</text>
    <!-- Example -->
    <rect x="48" y="252" width="118" height="24" rx="6" fill="rgba(255,255,255,0.15)"/>
    <text x="107" y="268" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)" font-style="italic">"Act as a CFO..."</text>
  </g>

  <!-- Arrow R to C -->
  <line x1="190" y1="190" x2="210" y2="190" stroke="#AAAAAA" stroke-width="2" marker-end="url(#arrowRight)"/>

  <!-- C - Context -->
  <g filter="url(#shadow)">
    <rect x="216" y="90" width="155" height="200" rx="12" fill="#1D428A"/>
    <circle cx="293" cy="130" r="28" fill="rgba(255,255,255,0.2)"/>
    <text x="293" y="140" text-anchor="middle" font-size="30" font-weight="800" fill="#FFFFFF">C</text>
    <text x="293" y="185" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">Context</text>
    <line x1="241" y1="198" x2="346" y2="198" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="293" y="220" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">Background</text>
    <text x="293" y="235" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">information</text>
    <rect x="234" y="252" width="118" height="24" rx="6" fill="rgba(255,255,255,0.15)"/>
    <text x="293" y="268" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)" font-style="italic">"Our Q3 revenue..."</text>
  </g>

  <!-- Arrow C to T -->
  <line x1="376" y1="190" x2="396" y2="190" stroke="#AAAAAA" stroke-width="2" marker-end="url(#arrowRight)"/>

  <!-- T - Task -->
  <g filter="url(#shadow)">
    <rect x="402" y="90" width="155" height="200" rx="12" fill="#00968F"/>
    <circle cx="479" cy="130" r="28" fill="rgba(255,255,255,0.2)"/>
    <text x="479" y="140" text-anchor="middle" font-size="30" font-weight="800" fill="#FFFFFF">T</text>
    <text x="479" y="185" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">Task</text>
    <line x1="427" y1="198" x2="532" y2="198" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="479" y="220" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">Specific</text>
    <text x="479" y="235" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">objective</text>
    <rect x="420" y="252" width="118" height="24" rx="6" fill="rgba(255,255,255,0.15)"/>
    <text x="479" y="268" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)" font-style="italic">"Create a summary..."</text>
  </g>

  <!-- Arrow T to F -->
  <line x1="562" y1="190" x2="582" y2="190" stroke="#AAAAAA" stroke-width="2" marker-end="url(#arrowRight)"/>

  <!-- F - Format -->
  <g filter="url(#shadow)">
    <rect x="588" y="90" width="155" height="200" rx="12" fill="#444444"/>
    <circle cx="665" cy="130" r="28" fill="rgba(255,255,255,0.2)"/>
    <text x="665" y="140" text-anchor="middle" font-size="30" font-weight="800" fill="#FFFFFF">F</text>
    <text x="665" y="185" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">Format</text>
    <line x1="613" y1="198" x2="718" y2="198" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="665" y="220" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">Response</text>
    <text x="665" y="235" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">structure</text>
    <rect x="606" y="252" width="118" height="24" rx="6" fill="rgba(255,255,255,0.15)"/>
    <text x="665" y="268" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)" font-style="italic">"Use bullet points..."</text>
  </g>

  <!-- Arrow F to C2 -->
  <line x1="748" y1="190" x2="768" y2="190" stroke="#AAAAAA" stroke-width="2" marker-end="url(#arrowRight)"/>

  <!-- C - Constraints -->
  <g filter="url(#shadow)">
    <rect x="774" y="90" width="155" height="200" rx="12" fill="#8B1A2B"/>
    <circle cx="851" cy="130" r="28" fill="rgba(255,255,255,0.2)"/>
    <text x="851" y="140" text-anchor="middle" font-size="30" font-weight="800" fill="#FFFFFF">C</text>
    <text x="851" y="185" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">Constraints</text>
    <line x1="799" y1="198" x2="904" y2="198" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="851" y="220" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">Rules and</text>
    <text x="851" y="235" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">boundaries</text>
    <rect x="792" y="252" width="118" height="24" rx="6" fill="rgba(255,255,255,0.15)"/>
    <text x="851" y="268" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)" font-style="italic">"Max 200 words..."</text>
  </g>

</svg>