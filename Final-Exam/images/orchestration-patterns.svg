<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680" font-family="Montserrat, Arial, sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowNavy" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#1D428A">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#00968F">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#C8102E">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#2E8B57">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#E67E22">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="680" fill="#FFFFFF" rx="8"/>

  <!-- Title -->
  <text x="480" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#333333">Orchestration Patterns</text>
  <text x="480" y="64" text-anchor="middle" font-size="12" fill="#888888">Three ways to coordinate multiple AI agents</text>

  <!-- Dividing lines -->
  <line x1="320" y1="85" x2="320" y2="640" stroke="#E8E8E8" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="640" y1="85" x2="640" y2="640" stroke="#E8E8E8" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ================================================================ -->
  <!-- COLUMN 1: SEQUENTIAL (Navy) -->
  <!-- ================================================================ -->
  <text x="160" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#1D428A">Sequential</text>
  <text x="160" y="128" text-anchor="middle" font-size="11" fill="#666666">Assembly Line</text>

  <!-- Agent A -->
  <g filter="url(#shadow)">
    <rect x="90" y="160" width="140" height="52" rx="12" fill="#1D428A"/>
  </g>
  <text x="160" y="191" text-anchor="middle" font-size="14" font-weight="600" fill="#FFFFFF">Agent A</text>

  <!-- Arrow A→B -->
  <line x1="160" y1="212" x2="160" y2="255" stroke="#1D428A" stroke-width="2.5" marker-end="url(#arrowNavy)"/>

  <!-- Agent B -->
  <g filter="url(#shadow)">
    <rect x="90" y="265" width="140" height="52" rx="12" fill="#1D428A"/>
  </g>
  <text x="160" y="296" text-anchor="middle" font-size="14" font-weight="600" fill="#FFFFFF">Agent B</text>

  <!-- Arrow B→C -->
  <line x1="160" y1="317" x2="160" y2="360" stroke="#1D428A" stroke-width="2.5" marker-end="url(#arrowNavy)"/>

  <!-- Agent C -->
  <g filter="url(#shadow)">
    <rect x="90" y="370" width="140" height="52" rx="12" fill="#1D428A"/>
  </g>
  <text x="160" y="401" text-anchor="middle" font-size="14" font-weight="600" fill="#FFFFFF">Agent C</text>

  <!-- Arrow to Output -->
  <line x1="160" y1="422" x2="160" y2="460" stroke="#1D428A" stroke-width="2.5" marker-end="url(#arrowNavy)"/>
  <rect x="115" y="466" width="90" height="30" rx="6" fill="#F5F5F5" stroke="#1D428A" stroke-width="1.5"/>
  <text x="160" y="486" text-anchor="middle" font-size="11" font-weight="600" fill="#1D428A">Output</text>

  <!-- Description -->
  <text x="160" y="530" text-anchor="middle" font-size="11" fill="#555555">Each step depends on</text>
  <text x="160" y="546" text-anchor="middle" font-size="11" fill="#555555">the previous one.</text>

  <!-- Trade-off box -->
  <rect x="50" y="570" width="220" height="52" rx="8" fill="#FFF8F0" stroke="#E8D5B8" stroke-width="1"/>
  <text x="160" y="590" text-anchor="middle" font-size="11" font-weight="600" fill="#8B6914">Trade-off</text>
  <text x="160" y="608" text-anchor="middle" font-size="10" fill="#8B6914">Slower, but ensures correctness</text>

  <!-- ================================================================ -->
  <!-- COLUMN 2: PARALLEL (Teal) -->
  <!-- ================================================================ -->
  <text x="480" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#00968F">Parallel</text>
  <text x="480" y="128" text-anchor="middle" font-size="11" fill="#666666">Simultaneous</text>

  <!-- Fork point -->
  <circle cx="480" cy="178" r="16" fill="#00968F"/>
  <text x="480" y="183" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">Fork</text>

  <!-- Fan-out arrows -->
  <path d="M468,192 L388,255" fill="none" stroke="#00968F" stroke-width="2" marker-end="url(#arrowTeal)"/>
  <line x1="480" y1="194" x2="480" y2="255" stroke="#00968F" stroke-width="2" marker-end="url(#arrowTeal)"/>
  <path d="M492,192 L572,255" fill="none" stroke="#00968F" stroke-width="2" marker-end="url(#arrowTeal)"/>

  <!-- Agent A -->
  <g filter="url(#shadow)">
    <rect x="340" y="265" width="90" height="52" rx="12" fill="#00968F"/>
  </g>
  <text x="385" y="296" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">Agent A</text>

  <!-- Agent B -->
  <g filter="url(#shadow)">
    <rect x="435" y="265" width="90" height="52" rx="12" fill="#00968F"/>
  </g>
  <text x="480" y="296" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">Agent B</text>

  <!-- Agent C -->
  <g filter="url(#shadow)">
    <rect x="530" y="265" width="90" height="52" rx="12" fill="#00968F"/>
  </g>
  <text x="575" y="296" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">Agent C</text>

  <!-- Fan-in arrows -->
  <path d="M388,317 L468,375" fill="none" stroke="#00968F" stroke-width="2" marker-end="url(#arrowTeal)"/>
  <line x1="480" y1="317" x2="480" y2="375" stroke="#00968F" stroke-width="2" marker-end="url(#arrowTeal)"/>
  <path d="M572,317 L492,375" fill="none" stroke="#00968F" stroke-width="2" marker-end="url(#arrowTeal)"/>

  <!-- Join point -->
  <circle cx="480" cy="393" r="16" fill="#00968F"/>
  <text x="480" y="398" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">Join</text>

  <!-- Arrow to Output -->
  <line x1="480" y1="409" x2="480" y2="460" stroke="#00968F" stroke-width="2.5" marker-end="url(#arrowTeal)"/>
  <rect x="435" y="466" width="90" height="30" rx="6" fill="#F5F5F5" stroke="#00968F" stroke-width="1.5"/>
  <text x="480" y="486" text-anchor="middle" font-size="11" font-weight="600" fill="#00968F">Output</text>

  <!-- Description -->
  <text x="480" y="530" text-anchor="middle" font-size="11" fill="#555555">Independent tasks run</text>
  <text x="480" y="546" text-anchor="middle" font-size="11" fill="#555555">at the same time.</text>

  <!-- Trade-off box -->
  <rect x="370" y="570" width="220" height="52" rx="8" fill="#FFF8F0" stroke="#E8D5B8" stroke-width="1"/>
  <text x="480" y="590" text-anchor="middle" font-size="11" font-weight="600" fill="#8B6914">Trade-off</text>
  <text x="480" y="608" text-anchor="middle" font-size="10" fill="#8B6914">Faster, but needs result merging</text>

  <!-- ================================================================ -->
  <!-- COLUMN 3: LOOP (Red) -->
  <!-- ================================================================ -->
  <text x="800" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#C8102E">Loop</text>
  <text x="800" y="128" text-anchor="middle" font-size="11" fill="#666666">Iterative</text>

  <!-- Agent A -->
  <g filter="url(#shadow)">
    <rect x="730" y="160" width="140" height="52" rx="12" fill="#C8102E"/>
  </g>
  <text x="800" y="191" text-anchor="middle" font-size="14" font-weight="600" fill="#FFFFFF">Agent A</text>

  <!-- Arrow A→Reviewer -->
  <line x1="800" y1="212" x2="800" y2="275" stroke="#C8102E" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- Reviewer -->
  <g filter="url(#shadow)">
    <rect x="730" y="285" width="140" height="52" rx="12" fill="#C8102E"/>
  </g>
  <text x="800" y="316" text-anchor="middle" font-size="14" font-weight="600" fill="#FFFFFF">Reviewer</text>

  <!-- Decision diamond -->
  <polygon points="800,370 840,400 800,430 760,400" fill="#FFF3F3" stroke="#C8102E" stroke-width="1.5"/>
  <text x="800" y="404" text-anchor="middle" font-size="10" font-weight="600" fill="#C8102E">Pass?</text>

  <!-- Arrow Reviewer → Diamond -->
  <line x1="800" y1="337" x2="800" y2="370" stroke="#C8102E" stroke-width="2"/>

  <!-- FAIL: Loop back to Agent A -->
  <path d="M760,400 L700,400 L700,186 L730,186" fill="none" stroke="#E67E22" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <rect x="672" y="278" width="32" height="22" rx="4" fill="#FFF3E0"/>
  <text x="688" y="293" text-anchor="middle" font-size="9" font-weight="600" fill="#E67E22">Fail</text>

  <!-- PASS: Exit to Output -->
  <line x1="800" y1="430" x2="800" y2="460" stroke="#2E8B57" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <rect x="838" y="435" width="38" height="22" rx="4" fill="#F0FFF0"/>
  <text x="857" y="450" text-anchor="middle" font-size="9" font-weight="600" fill="#2E8B57">Pass</text>

  <rect x="755" y="466" width="90" height="30" rx="6" fill="#F5F5F5" stroke="#2E8B57" stroke-width="1.5"/>
  <text x="800" y="486" text-anchor="middle" font-size="11" font-weight="600" fill="#2E8B57">Output</text>

  <!-- Description -->
  <text x="800" y="530" text-anchor="middle" font-size="11" fill="#555555">Refine until quality</text>
  <text x="800" y="546" text-anchor="middle" font-size="11" fill="#555555">threshold is met.</text>

  <!-- Trade-off box -->
  <rect x="690" y="570" width="220" height="52" rx="8" fill="#FFF8F0" stroke="#E8D5B8" stroke-width="1"/>
  <text x="800" y="590" text-anchor="middle" font-size="11" font-weight="600" fill="#8B6914">Trade-off</text>
  <text x="800" y="608" text-anchor="middle" font-size="10" fill="#8B6914">Highest quality, most expensive</text>

  <!-- Bottom note -->
  <text x="480" y="665" text-anchor="middle" font-size="11" fill="#999999">Choose the pattern that matches your task's requirements for speed, quality, and cost.</text>
</svg>