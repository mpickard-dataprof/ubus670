<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Montserrat, Arial, sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="tempGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1D428A"/>
      <stop offset="20%" stop-color="#2E7D9E"/>
      <stop offset="50%" stop-color="#8B9A3B"/>
      <stop offset="80%" stop-color="#D4752E"/>
      <stop offset="100%" stop-color="#C8102E"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#333333">Temperature Setting Spectrum</text>
  <text x="450" y="62" text-anchor="middle" font-size="12" fill="#888888">Controls randomness in AI responses</text>

  <!-- Zone backgrounds -->
  <rect x="100" y="100" width="168" height="120" rx="8" fill="#E8EEF6" opacity="0.5"/>
  <rect x="268" y="100" width="364" height="120" rx="8" fill="#F5F5F0" opacity="0.5"/>
  <rect x="632" y="100" width="168" height="120" rx="8" fill="#FCEAE8" opacity="0.5"/>

  <!-- Zone labels -->
  <text x="184" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#1D428A">Deterministic</text>
  <text x="184" y="145" text-anchor="middle" font-size="11" fill="#1D428A" opacity="0.7">Focused &amp; Precise</text>
  <text x="450" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#666666">Balanced</text>
  <text x="450" y="145" text-anchor="middle" font-size="11" fill="#666666" opacity="0.7">General Purpose</text>
  <text x="716" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#C8102E">Creative</text>
  <text x="716" y="145" text-anchor="middle" font-size="11" fill="#C8102E" opacity="0.7">Diverse &amp; Novel</text>

  <!-- Main gradient bar -->
  <rect x="100" y="170" width="700" height="30" rx="15" fill="url(#tempGrad)" filter="url(#shadow)"/>

  <!-- Scale markings -->
  <g font-size="12" fill="#333333" font-weight="600">
    <line x1="100" y1="205" x2="100" y2="215" stroke="#666" stroke-width="1.5"/>
    <text x="100" y="230" text-anchor="middle">0.0</text>

    <line x1="240" y1="205" x2="240" y2="215" stroke="#666" stroke-width="1.5"/>
    <text x="240" y="230" text-anchor="middle">0.2</text>

    <line x1="450" y1="205" x2="450" y2="215" stroke="#666" stroke-width="1.5"/>
    <text x="450" y="230" text-anchor="middle">0.5</text>

    <line x1="660" y1="205" x2="660" y2="215" stroke="#666" stroke-width="1.5"/>
    <text x="660" y="230" text-anchor="middle">0.8</text>

    <line x1="800" y1="205" x2="800" y2="215" stroke="#666" stroke-width="1.5"/>
    <text x="800" y="230" text-anchor="middle">1.0</text>
  </g>

  <!-- Sliding indicator dot -->
  <circle cx="380" cy="185" r="10" fill="#FFFFFF" stroke="#333333" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="380" cy="185" r="4" fill="#333333"/>

  <!-- Example boxes -->
  <!-- Low temp examples -->
  <g filter="url(#shadow)">
    <rect x="60" y="260" width="248" height="130" rx="12" fill="#FFFFFF" stroke="#1D428A" stroke-width="1.5"/>
    <rect x="60" y="260" width="248" height="30" rx="12" fill="#1D428A"/>
    <rect x="60" y="278" width="248" height="12" fill="#1D428A"/>
    <text x="184" y="282" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Low Temperature (0.0 - 0.2)</text>
    <circle cx="82" cy="310" r="3" fill="#1D428A"/>
    <text x="92" y="314" font-size="11" fill="#333333">Legal contracts</text>
    <circle cx="82" cy="332" r="3" fill="#1D428A"/>
    <text x="92" y="336" font-size="11" fill="#333333">Data extraction</text>
    <circle cx="82" cy="354" r="3" fill="#1D428A"/>
    <text x="92" y="358" font-size="11" fill="#333333">Classification tasks</text>
    <circle cx="82" cy="376" r="3" fill="#1D428A"/>
    <text x="92" y="380" font-size="11" fill="#333333">Code generation</text>
  </g>

  <!-- Mid temp examples -->
  <g filter="url(#shadow)">
    <rect x="326" y="260" width="248" height="130" rx="12" fill="#FFFFFF" stroke="#888888" stroke-width="1.5"/>
    <rect x="326" y="260" width="248" height="30" rx="12" fill="#777777"/>
    <rect x="326" y="278" width="248" height="12" fill="#777777"/>
    <text x="450" y="282" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Medium Temperature (0.3 - 0.7)</text>
    <circle cx="348" cy="310" r="3" fill="#777777"/>
    <text x="358" y="314" font-size="11" fill="#333333">Business emails</text>
    <circle cx="348" cy="332" r="3" fill="#777777"/>
    <text x="358" y="336" font-size="11" fill="#333333">Summaries &amp; reports</text>
    <circle cx="348" cy="354" r="3" fill="#777777"/>
    <text x="358" y="358" font-size="11" fill="#333333">Q&amp;A responses</text>
    <circle cx="348" cy="376" r="3" fill="#777777"/>
    <text x="358" y="380" font-size="11" fill="#333333">General conversation</text>
  </g>

  <!-- High temp examples -->
  <g filter="url(#shadow)">
    <rect x="592" y="260" width="248" height="130" rx="12" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
    <rect x="592" y="260" width="248" height="30" rx="12" fill="#C8102E"/>
    <rect x="592" y="278" width="248" height="12" fill="#C8102E"/>
    <text x="716" y="282" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">High Temperature (0.8 - 1.0)</text>
    <circle cx="614" cy="310" r="3" fill="#C8102E"/>
    <text x="624" y="314" font-size="11" fill="#333333">Brainstorming</text>
    <circle cx="614" cy="332" r="3" fill="#C8102E"/>
    <text x="624" y="336" font-size="11" fill="#333333">Ad copy &amp; marketing</text>
    <circle cx="614" cy="354" r="3" fill="#C8102E"/>
    <text x="624" y="358" font-size="11" fill="#333333">Social media posts</text>
    <circle cx="614" cy="376" r="3" fill="#C8102E"/>
    <text x="624" y="380" font-size="11" fill="#333333">Creative writing</text>
  </g>
</svg>