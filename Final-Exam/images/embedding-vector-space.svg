<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="Montserrat, Arial, sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowDash" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" fill="#888888">
      <polygon points="0 0, 8 3, 0 6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="#FAFAFA" rx="8"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#333333">Words as Points in Vector Space</text>
  <text x="450" y="64" text-anchor="middle" font-size="12" fill="#888888">Embeddings place similar meanings close together in multi-dimensional space</text>

  <!-- Chart area: axes -->
  <!-- Origin at (120, 600), x-axis to (830, 600), y-axis to (120, 90) -->
  <line x1="120" y1="600" x2="840" y2="600" stroke="#CCCCCC" stroke-width="1.5"/>
  <line x1="120" y1="600" x2="120" y2="90" stroke="#CCCCCC" stroke-width="1.5"/>

  <!-- Axis arrows -->
  <polygon points="840,600 830,595 830,605" fill="#CCCCCC"/>
  <polygon points="120,90 115,100 125,100" fill="#CCCCCC"/>

  <!-- Axis labels -->
  <text x="480" y="640" text-anchor="middle" font-size="13" font-weight="600" fill="#888888">Dimension 1</text>
  <text x="60" y="350" text-anchor="middle" font-size="13" font-weight="600" fill="#888888" transform="rotate(-90,60,350)">Dimension 2</text>

  <!-- Light grid -->
  <line x1="120" y1="450" x2="840" y2="450" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="120" y1="300" x2="840" y2="300" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="120" y1="150" x2="840" y2="150" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="360" y1="90" x2="360" y2="600" stroke="#F0F0F0" stroke-width="1"/>
  <line x1="600" y1="90" x2="600" y2="600" stroke="#F0F0F0" stroke-width="1"/>

  <!-- ================================================================ -->
  <!-- CLUSTER 1: Negative Sentiment (Red) — top-right -->
  <!-- ================================================================ -->
  <ellipse cx="680" cy="180" rx="130" ry="90" fill="none" stroke="#C8102E" stroke-width="2" stroke-dasharray="8,5" opacity="0.6"/>

  <!-- Dots -->
  <circle cx="640" cy="155" r="8" fill="#C8102E" filter="url(#softGlow)"/>
  <text x="640" y="140" text-anchor="middle" font-size="11" font-weight="500" fill="#C8102E">terrible</text>

  <circle cx="710" cy="175" r="8" fill="#C8102E" filter="url(#softGlow)"/>
  <text x="710" y="160" text-anchor="middle" font-size="11" font-weight="500" fill="#C8102E">awful</text>

  <circle cx="665" cy="215" r="8" fill="#C8102E" filter="url(#softGlow)"/>
  <text x="665" y="240" text-anchor="middle" font-size="11" font-weight="500" fill="#C8102E">disappointing</text>

  <circle cx="730" cy="140" r="6" fill="#C8102E" opacity="0.5"/>
  <circle cx="620" cy="195" r="5" fill="#C8102E" opacity="0.4"/>
  <circle cx="750" cy="200" r="5" fill="#C8102E" opacity="0.4"/>

  <!-- Cluster label -->
  <rect x="610" y="268" width="150" height="26" rx="6" fill="#C8102E" opacity="0.1"/>
  <text x="685" y="286" text-anchor="middle" font-size="12" font-weight="700" fill="#C8102E">Negative Sentiment</text>

  <!-- ================================================================ -->
  <!-- CLUSTER 2: Positive Sentiment (Teal) — bottom-right -->
  <!-- ================================================================ -->
  <ellipse cx="660" cy="470" rx="140" ry="85" fill="none" stroke="#00968F" stroke-width="2" stroke-dasharray="8,5" opacity="0.6"/>

  <!-- Dots -->
  <circle cx="620" cy="445" r="8" fill="#00968F" filter="url(#softGlow)"/>
  <text x="620" y="430" text-anchor="middle" font-size="11" font-weight="500" fill="#00968F">excellent</text>

  <circle cx="700" cy="465" r="8" fill="#00968F" filter="url(#softGlow)"/>
  <text x="700" y="450" text-anchor="middle" font-size="11" font-weight="500" fill="#00968F">wonderful</text>

  <circle cx="650" cy="505" r="8" fill="#00968F" filter="url(#softGlow)"/>
  <text x="650" y="530" text-anchor="middle" font-size="11" font-weight="500" fill="#00968F">fantastic</text>

  <circle cx="730" cy="500" r="5" fill="#00968F" opacity="0.4"/>
  <circle cx="590" cy="490" r="6" fill="#00968F" opacity="0.5"/>
  <circle cx="710" cy="430" r="5" fill="#00968F" opacity="0.4"/>

  <!-- Cluster label -->
  <rect x="585" y="548" width="150" height="26" rx="6" fill="#00968F" opacity="0.1"/>
  <text x="660" y="566" text-anchor="middle" font-size="12" font-weight="700" fill="#00968F">Positive Sentiment</text>

  <!-- ================================================================ -->
  <!-- CLUSTER 3: Transaction Intent (Navy) — left -->
  <!-- ================================================================ -->
  <ellipse cx="290" cy="380" rx="120" ry="110" fill="none" stroke="#1D428A" stroke-width="2" stroke-dasharray="8,5" opacity="0.6"/>

  <!-- Dots -->
  <circle cx="260" cy="345" r="8" fill="#1D428A" filter="url(#softGlow)"/>
  <text x="260" y="330" text-anchor="middle" font-size="11" font-weight="500" fill="#1D428A">refund</text>

  <circle cx="320" cy="380" r="8" fill="#1D428A" filter="url(#softGlow)"/>
  <text x="320" y="365" text-anchor="middle" font-size="11" font-weight="500" fill="#1D428A">return</text>

  <circle cx="275" cy="420" r="8" fill="#1D428A" filter="url(#softGlow)"/>
  <text x="275" y="445" text-anchor="middle" font-size="11" font-weight="500" fill="#1D428A">exchange</text>

  <circle cx="340" cy="340" r="5" fill="#1D428A" opacity="0.4"/>
  <circle cx="240" cy="400" r="6" fill="#1D428A" opacity="0.5"/>
  <circle cx="310" cy="430" r="5" fill="#1D428A" opacity="0.4"/>

  <!-- Cluster label -->
  <rect x="215" y="492" width="150" height="26" rx="6" fill="#1D428A" opacity="0.1"/>
  <text x="290" y="510" text-anchor="middle" font-size="12" font-weight="700" fill="#1D428A">Transaction Intent</text>

  <!-- ================================================================ -->
  <!-- DISTANCE ARROW between Negative and Positive clusters -->
  <!-- ================================================================ -->
  <path d="M685,295 Q760,370 700,420" fill="none" stroke="#888888" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arrowDash)"/>
  <!-- Label on the distance arrow -->
  <rect x="735" y="340" width="145" height="34" rx="6" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1" filter="url(#shadow)"/>
  <text x="808" y="354" text-anchor="middle" font-size="10" font-weight="600" fill="#666666">Distance = Semantic</text>
  <text x="808" y="368" text-anchor="middle" font-size="10" font-weight="600" fill="#666666">Difference</text>

  <!-- ================================================================ -->
  <!-- DISTANCE ARROW between Transaction and Negative -->
  <!-- ================================================================ -->
  <path d="M370,310 Q470,220 600,185" fill="none" stroke="#888888" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowDash)"/>

  <!-- ================================================================ -->
  <!-- NOTE BOX -->
  <!-- ================================================================ -->
  <rect x="145" y="565" width="260" height="48" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow)"/>
  <text x="165" y="586" font-size="11" font-weight="600" fill="#333333">Key Insight:</text>
  <text x="165" y="603" font-size="10" fill="#666666">Similar meanings cluster together.</text>

  <!-- Small explanatory note -->
  <text x="450" y="685" text-anchor="middle" font-size="10" fill="#AAAAAA">Simplified to 2D for illustration. Real embeddings use hundreds of dimensions.</text>
</svg>