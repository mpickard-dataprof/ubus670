<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="Montserrat, Arial, sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feOffset dx="0" dy="0"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1"/>
      <feFlood flood-color="#FFFFFF" flood-opacity="0.15"/>
      <feComposite operator="in" in2="blur"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="labelArrow" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333333"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1D428A">Five-Layer Defense Model</text>
  <text x="450" y="60" text-anchor="middle" font-size="12" fill="#666666">Defense in Depth for AI-Powered Business Applications</text>

  <!-- ════════════ Layer 1 (Outermost): Perimeter — Input Validation ════════════ -->
  <rect x="60" y="80" width="540" height="530" rx="20" fill="#F0F0F0" stroke="#CCCCCC" stroke-width="2" filter="url(#shadow)"/>
  <!-- Layer 1 label area (top strip) -->
  <rect x="60" y="80" width="540" height="50" rx="20" fill="#E0E0E0"/>
  <rect x="60" y="100" width="540" height="30" fill="#E0E0E0"/>

  <!-- Fence icon -->
  <g transform="translate(80, 90)">
    <rect x="0" y="6" width="3" height="20" rx="1" fill="#888"/>
    <rect x="9" y="6" width="3" height="20" rx="1" fill="#888"/>
    <rect x="18" y="6" width="3" height="20" rx="1" fill="#888"/>
    <rect x="27" y="6" width="3" height="20" rx="1" fill="#888"/>
    <rect x="0" y="10" width="30" height="2.5" rx="1" fill="#888"/>
    <rect x="0" y="18" width="30" height="2.5" rx="1" fill="#888"/>
  </g>
  <text x="120" y="108" font-size="14" font-weight="700" fill="#555555">LAYER 1: Perimeter</text>
  <text x="120" y="124" font-size="11" fill="#777777">Input Validation &amp; Sanitization</text>

  <!-- ════════════ Layer 2: Identity — Identity Anchoring ════════════ -->
  <rect x="100" y="146" width="460" height="440" rx="18" fill="#1D428A" stroke="#153670" stroke-width="2" opacity="0.9"/>
  <rect x="100" y="146" width="460" height="46" rx="18" fill="#1D428A"/>
  <rect x="100" y="164" width="460" height="28" fill="#1D428A"/>

  <!-- Badge icon -->
  <g transform="translate(120, 155)">
    <rect x="2" y="0" width="18" height="24" rx="4" fill="#FFFFFF" opacity="0.3"/>
    <circle cx="11" cy="10" r="4" fill="#FFFFFF" opacity="0.4"/>
    <rect x="5" y="17" width="12" height="3" rx="1" fill="#FFFFFF" opacity="0.3"/>
  </g>
  <text x="152" y="170" font-size="13" font-weight="700" fill="#FFFFFF">LAYER 2: Identity</text>
  <text x="152" y="186" font-size="11" fill="#FFFFFF" opacity="0.75">Identity Anchoring — "I am Beacon's CS AI"</text>

  <!-- ════════════ Layer 3: Behavior — Scope Limitation ════════════ -->
  <rect x="140" y="206" width="380" height="356" rx="16" fill="#00968F" stroke="#007A74" stroke-width="2"/>
  <rect x="140" y="206" width="380" height="44" rx="16" fill="#00968F"/>
  <rect x="140" y="222" width="380" height="28" fill="#00968F"/>

  <!-- Camera icon -->
  <g transform="translate(160, 214)">
    <rect x="0" y="6" width="22" height="16" rx="3" fill="#FFFFFF" opacity="0.3"/>
    <circle cx="11" cy="14" r="5" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
    <rect x="7" y="3" width="8" height="5" rx="2" fill="#FFFFFF" opacity="0.3"/>
  </g>
  <text x="192" y="228" font-size="13" font-weight="700" fill="#FFFFFF">LAYER 3: Behavior</text>
  <text x="192" y="244" font-size="11" fill="#FFFFFF" opacity="0.75">Scope Limitation — only orders, returns, hours</text>

  <!-- ════════════ Layer 4: Escalation — Human Handoff ════════════ -->
  <rect x="180" y="266" width="300" height="272" rx="14" fill="#E8A0A0" stroke="#C8102E" stroke-width="2"/>
  <rect x="180" y="266" width="300" height="42" rx="14" fill="#D46060"/>
  <rect x="180" y="280" width="300" height="28" fill="#D46060"/>

  <!-- Button icon -->
  <g transform="translate(200, 274)">
    <circle cx="11" cy="12" r="10" fill="#FFFFFF" opacity="0.3"/>
    <circle cx="11" cy="12" r="6" fill="#FFFFFF" opacity="0.4"/>
    <text x="11" y="16" text-anchor="middle" font-size="8" font-weight="700" fill="#C8102E" opacity="0.8">!</text>
  </g>
  <text x="232" y="290" font-size="13" font-weight="700" fill="#FFFFFF">LAYER 4: Escalation</text>
  <text x="232" y="306" font-size="11" fill="#FFFFFF" opacity="0.85">Human Handoff — legal, complex, hostile</text>

  <!-- ════════════ Layer 5 (Innermost): Recovery — Safe Fallback ════════════ -->
  <rect x="220" y="326" width="220" height="188" rx="12" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="2" filter="url(#shadow)"/>

  <!-- Fire-drill icon -->
  <g transform="translate(245, 340)">
    <path d="M10,0 C6,6 0,8 0,16 C0,22 4,26 10,26 C16,26 20,22 20,16 C20,8 14,6 10,0Z" fill="#FF9800" opacity="0.5"/>
    <path d="M10,8 C8,12 4,13 4,18 C4,22 7,24 10,24 C13,24 16,22 16,18 C16,13 12,12 10,8Z" fill="#FFD54F" opacity="0.5"/>
  </g>
  <text x="275" y="354" font-size="13" font-weight="700" fill="#333333">LAYER 5: Recovery</text>
  <text x="275" y="372" font-size="11" fill="#666666">Safe Fallback Response</text>

  <!-- Inner content -->
  <rect x="236" y="386" width="188" height="112" rx="8" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <text x="330" y="410" text-anchor="middle" font-size="10" fill="#555555" font-style="italic">"I'm sorry, I can't help</text>
  <text x="330" y="426" text-anchor="middle" font-size="10" fill="#555555" font-style="italic">with that request. Here's</text>
  <text x="330" y="442" text-anchor="middle" font-size="10" fill="#555555" font-style="italic">what I CAN do for you:"</text>
  <text x="330" y="466" text-anchor="middle" font-size="10" fill="#00968F" font-weight="600">- Check order status</text>
  <text x="330" y="482" text-anchor="middle" font-size="10" fill="#00968F" font-weight="600">- Start a return</text>

  <!-- ════════════ Right-side Labels with Lines ════════════ -->
  <!-- Layer 1 label -->
  <line x1="602" y1="105" x2="650" y2="105" stroke="#888888" stroke-width="1.5"/>
  <circle cx="654" cy="105" r="4" fill="#888888"/>
  <rect x="662" y="88" width="210" height="36" rx="8" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="1.5"/>
  <text x="767" y="104" text-anchor="middle" font-size="10" font-weight="600" fill="#555555">Block SQL injection, scripts,</text>
  <text x="767" y="117" text-anchor="middle" font-size="10" fill="#555555">known attack patterns</text>

  <!-- Layer 2 label -->
  <line x1="562" y1="178" x2="650" y2="178" stroke="#1D428A" stroke-width="1.5"/>
  <circle cx="654" cy="178" r="4" fill="#1D428A"/>
  <rect x="662" y="162" width="210" height="36" rx="8" fill="#E8EDF5" stroke="#1D428A" stroke-width="1.5"/>
  <text x="767" y="178" text-anchor="middle" font-size="10" font-weight="600" fill="#1D428A">Reinforce role on every call;</text>
  <text x="767" y="191" text-anchor="middle" font-size="10" fill="#1D428A">reject identity overrides</text>

  <!-- Layer 3 label -->
  <line x1="522" y1="260" x2="650" y2="260" stroke="#00968F" stroke-width="1.5"/>
  <circle cx="654" cy="260" r="4" fill="#00968F"/>
  <rect x="662" y="244" width="210" height="36" rx="8" fill="#E5F5F4" stroke="#00968F" stroke-width="1.5"/>
  <text x="767" y="260" text-anchor="middle" font-size="10" font-weight="600" fill="#00968F">Restrict topics; refuse</text>
  <text x="767" y="273" text-anchor="middle" font-size="10" fill="#00968F">out-of-scope requests</text>

  <!-- Layer 4 label -->
  <line x1="482" y1="340" x2="650" y2="340" stroke="#C8102E" stroke-width="1.5"/>
  <circle cx="654" cy="340" r="4" fill="#C8102E"/>
  <rect x="662" y="324" width="210" height="36" rx="8" fill="#FDE8EB" stroke="#C8102E" stroke-width="1.5"/>
  <text x="767" y="340" text-anchor="middle" font-size="10" font-weight="600" fill="#C8102E">Route to human when</text>
  <text x="767" y="353" text-anchor="middle" font-size="10" fill="#C8102E">risk exceeds threshold</text>

  <!-- Layer 5 label -->
  <line x1="442" y1="420" x2="650" y2="420" stroke="#888888" stroke-width="1.5"/>
  <circle cx="654" cy="420" r="4" fill="#888888"/>
  <rect x="662" y="404" width="210" height="36" rx="8" fill="#FFF8E1" stroke="#FF9800" stroke-width="1.5"/>
  <text x="767" y="420" text-anchor="middle" font-size="10" font-weight="600" fill="#E65100">Graceful failure; never</text>
  <text x="767" y="433" text-anchor="middle" font-size="10" fill="#E65100">reveal internal details</text>

  <!-- ════════════ Bottom Callout ════════════ -->
  <rect x="130" y="630" width="640" height="52" rx="12" fill="#1D428A" filter="url(#shadow)"/>
  <text x="450" y="654" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Defense in Depth: An attacker must defeat ALL five layers to succeed.</text>
  <text x="450" y="672" text-anchor="middle" font-size="11" fill="#FFFFFF" opacity="0.8">Each layer is independent — failure at one layer does not compromise the others.</text>
</svg>