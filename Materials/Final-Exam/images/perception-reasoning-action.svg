<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="Montserrat, Arial, sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowDark" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#333333">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="520" fill="#FFFFFF" rx="8"/>

  <!-- Title -->
  <text x="480" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#333333">Perception → Reasoning → Action</text>
  <text x="480" y="64" text-anchor="middle" font-size="12" fill="#888888">How an AI agent processes a task from input to output</text>

  <!-- ========== BOX 1: PERCEPTION (Navy) ========== -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="240" height="130" rx="12" fill="#1D428A"/>
  </g>
  <!-- Eye icon -->
  <ellipse cx="130" cy="148" rx="18" ry="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="130" cy="148" r="6" fill="#FFFFFF"/>
  <circle cx="130" cy="148" r="2.5" fill="#1D428A"/>
  <!-- Labels -->
  <text x="160" y="152" font-size="16" font-weight="700" fill="#FFFFFF">Perception</text>
  <text x="180" y="178" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)">Receive &amp; understand input</text>
  <!-- Divider -->
  <line x1="80" y1="195" x2="280" y2="195" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- Subtitle -->
  <text x="180" y="218" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)" font-style="italic">"Read the customer email"</text>

  <!-- ========== ARROW 1 ========== -->
  <line x1="310" y1="175" x2="355" y2="175" stroke="#333333" stroke-width="2.5" marker-end="url(#arrowDark)"/>

  <!-- ========== BOX 2: REASONING (Teal) ========== -->
  <g filter="url(#shadow)">
    <rect x="365" y="110" width="240" height="130" rx="12" fill="#00968F"/>
  </g>
  <!-- Brain icon (simplified) -->
  <path d="M425,140 Q425,130 435,130 Q445,130 445,138 Q455,132 460,140 Q468,138 468,148 Q468,156 460,158 Q462,165 455,168 Q448,172 440,168 Q434,172 428,168 Q420,164 420,155 Q415,152 418,145 Q420,140 425,140 Z" fill="none" stroke="#FFFFFF" stroke-width="1.8"/>
  <line x1="444" y1="135" x2="444" y2="165" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
  <!-- Labels -->
  <text x="485" y="150" font-size="16" font-weight="700" fill="#FFFFFF">Reasoning</text>
  <text x="485" y="174" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)">Analyze &amp; decide</text>
  <!-- Divider -->
  <line x1="385" y1="195" x2="585" y2="195" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- Subtitle -->
  <text x="485" y="218" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)" font-style="italic">"Classify: complaint, urgency=high"</text>

  <!-- ========== ARROW 2 ========== -->
  <line x1="615" y1="175" x2="660" y2="175" stroke="#333333" stroke-width="2.5" marker-end="url(#arrowDark)"/>

  <!-- ========== BOX 3: ACTION (Red) ========== -->
  <g filter="url(#shadow)">
    <rect x="670" y="110" width="240" height="130" rx="12" fill="#C8102E"/>
  </g>
  <!-- Gear icon -->
  <circle cx="720" cy="148" r="12" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="720" cy="148" r="4" fill="#FFFFFF"/>
  <line x1="720" y1="134" x2="720" y2="138" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="720" y1="158" x2="720" y2="162" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="706" y1="148" x2="710" y2="148" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="730" y1="148" x2="734" y2="148" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Labels -->
  <text x="760" y="152" font-size="16" font-weight="700" fill="#FFFFFF">Action</text>
  <text x="790" y="178" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.85)">Execute the decision</text>
  <!-- Divider -->
  <line x1="690" y1="195" x2="890" y2="195" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- Subtitle -->
  <text x="790" y="218" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)" font-style="italic">"Route to queue, draft response"</text>

  <!-- ========== BEACON EXAMPLE (Below) ========== -->
  <rect x="60" y="295" width="850" height="170" rx="12" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Header -->
  <rect x="60" y="295" width="850" height="36" rx="12" fill="#F0F0F0"/>
  <rect x="60" y="319" width="850" height="12" fill="#F0F0F0"/>
  <text x="485" y="318" text-anchor="middle" font-size="13" font-weight="700" fill="#333333">Beacon Retail Group Example</text>

  <!-- Example flow -->
  <!-- Step 1 -->
  <rect x="90" y="350" width="220" height="88" rx="8" fill="#FFFFFF" stroke="#1D428A" stroke-width="1.5"/>
  <circle cx="110" cy="372" r="8" fill="#1D428A"/>
  <text x="110" y="376" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">1</text>
  <text x="200" y="374" text-anchor="middle" font-size="12" font-weight="600" fill="#1D428A">Perception</text>
  <text x="200" y="396" text-anchor="middle" font-size="11" fill="#555555">Customer emails:</text>
  <text x="200" y="412" text-anchor="middle" font-size="10" fill="#777777" font-style="italic">"My order arrived damaged</text>
  <text x="200" y="426" text-anchor="middle" font-size="10" fill="#777777" font-style="italic">and I want a refund NOW"</text>

  <!-- Arrow -->
  <line x1="320" y1="394" x2="358" y2="394" stroke="#333333" stroke-width="2" marker-end="url(#arrowDark)"/>

  <!-- Step 2 -->
  <rect x="368" y="350" width="220" height="88" rx="8" fill="#FFFFFF" stroke="#00968F" stroke-width="1.5"/>
  <circle cx="388" cy="372" r="8" fill="#00968F"/>
  <text x="388" y="376" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">2</text>
  <text x="478" y="374" text-anchor="middle" font-size="12" font-weight="600" fill="#00968F">Reasoning</text>
  <text x="478" y="396" text-anchor="middle" font-size="11" fill="#555555">AI classifies:</text>
  <text x="478" y="412" text-anchor="middle" font-size="10" fill="#777777">Type: Complaint | Urgency: High</text>
  <text x="478" y="426" text-anchor="middle" font-size="10" fill="#777777">Sentiment: Negative (-0.8)</text>

  <!-- Arrow -->
  <line x1="598" y1="394" x2="636" y2="394" stroke="#333333" stroke-width="2" marker-end="url(#arrowDark)"/>

  <!-- Step 3 -->
  <rect x="646" y="350" width="234" height="88" rx="8" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <circle cx="666" cy="372" r="8" fill="#C8102E"/>
  <text x="666" y="376" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">3</text>
  <text x="763" y="374" text-anchor="middle" font-size="12" font-weight="600" fill="#C8102E">Action</text>
  <text x="763" y="396" text-anchor="middle" font-size="11" fill="#555555">AI executes:</text>
  <text x="763" y="412" text-anchor="middle" font-size="10" fill="#777777">Route → Priority Support Queue</text>
  <text x="763" y="426" text-anchor="middle" font-size="10" fill="#777777">Draft empathetic response + refund</text>

  <!-- Bottom note -->
  <text x="480" y="500" text-anchor="middle" font-size="11" fill="#999999">Each phase maps to a distinct capability — perception, reasoning, and action — that together form an intelligent agent.</text>
</svg>